# This file contains common pin mappings for the BigTreeTech E3 RRF 1.1.
# To use this config, the firmware should be compiled for the
# STM32F407 with a "32KiB bootloader".

# The "make flash" command does not work on the E3 RRF 1.1. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the E3 RRF
# 1.1 with that SD card.

# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]
[include display.cfg]
[include menu.cfg]
[include timelapse.cfg]
[include Adaptive_Mesh.cfg]
[include Line_Purge.cfg]
[include macros.cfg]
[include sensorless.cfg]



[exclude_object]
  
[gcode_arcs]
resolution: 0.1

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_300021001047303033333839-if00

[printer]
kinematics: corexy
minimum_cruise_ratio: 0
max_velocity: 500
max_accel: 20000
max_z_velocity: 50
max_z_accel: 250

[extruder]
step_pin: PD12
dir_pin: PD13
enable_pin: !PD10
microsteps: 32
rotation_distance: 3.45
pressure_advance: 0.024
nozzle_diameter: 0.600
filament_diameter: 1.750
heater_pin: PB3
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA0
control: pid
pid_Kp = 40.185
pid_Ki = 12.757
pid_Kd = 31.646
min_temp: 0
max_temp: 280
max_extrude_cross_section: 9999999
max_extrude_only_distance: 700
min_extrude_temp: 0

[tmc2209 extruder]
uart_pin: PD11
run_current: 0.850
hold_current: 0.500
diag_pin: ^PC3    # Set to MCU pin connected to TMC DIAG pin
driver_SGTHRS: 255 # 255 is most sensitive value, 0 is least sensitive

[bltouch]
sensor_pin: ^PC5
control_pin: PB0
x_offset: -34.1
y_offset: -11.7
#Higher the offset, the closer to the bed the nozzle will be.
#Lower the offset, the further the nozzle will be.
#If you need more squish or if it's too high, increase the offset.
#If it's too close, lower the offset.
z_offset = 0.55
#pin_move_time: 0.8
probe_with_touch_mode: True
pin_up_touch_mode_reports_triggered: False
stow_on_each_sample: False

[bed_mesh]
speed: 150
horizontal_move_z: 7
mesh_min: 20,20
mesh_max: 195, 210
probe_count: 5,5
algorithm: lagrange
fade_start: 1
fade_end: 10
#fade_target: 0
bicubic_tension: 0.15


[thermistor NTC100K-B3950]
temperature1: 25
resistance1: 100000
temperature2: 160
resistance2: 1374
temperature3: 300
resistance3: 84.78


[adxl345]
cs_pin: rpi:gpio74
spi_bus: spidev1.1

[resonance_tester]
accel_chip: adxl345
probe_points:
  110, 115, 30
#sweeping_period: 0


[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 66.6
shaper_type_y: mzv
shaper_freq_y: 54.8


[stepper_x]
step_pin: PD0
dir_pin: PA15
enable_pin: !PD3
microsteps: 32
rotation_distance: 39.8
#rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: -2
position_endstop: -2
position_max: 230
homing_speed: 50
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PD6
run_current: 0.900
hold_current: 0.700
diag_pin: ^PC0     # Set to MCU pin connected to TMC DIAG pin
driver_SGTHRS: 120 # 255 is most sensitive value, 0 is least sensitive
interpolate: False

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PD7
microsteps: 32
rotation_distance: 39.8
#rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
#endstop_pin: !PC1
position_min: -17
position_endstop: 250
position_max: 250
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PD1
run_current: 0.900
hold_current: 0.700
diag_pin: ^PC1      # Set to MCU pin connected to TMC DIAG pin
driver_SGTHRS: 90 #115 # 255 is most sensitive value, 0 is least sensitive
interpolate: False

[stepper_z]
step_pin: PC6
dir_pin: !PC7
enable_pin: !PD14
microsteps: 32
rotation_distance: 8
#endstop_pin: tmc2209_stepper_z:virtual_endstop
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0
position_max: 270
position_min: -1
homing_speed: 25
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PD15
run_current: 0.900

#diag_pin: ^PC2     # Set to MCU pin connected to TMC DIAG pin
#driver_SGTHRS: 5  # 255 is most sensitive value, 0 is least sensitive


[verify_heater extruder]
check_gain_time: 20
#   This controls heater verification during initial heating. Smaller
#   values result in stricter checking and larger values allow for
#   more time before an error is reported. Specifically, during
#   initial heating, as long as the heater increases in temperature
#   within this time frame (specified in seconds) then the internal
#   "error counter" is reset. The default is 20 seconds for extruders
#   and 60 seconds for heater_bed.
hysteresis: 10
#   The maximum temperature difference (in Celsius) to a target
#   temperature that is considered in range of the target. This
#   controls the max_error range check. It is rare to customize this
#   value. The default is 5.
heating_gain: 2
#   The minimum temperature (in Celsius) that the heater must increase
#   by during the check_gain_time check. It is rare to customize this
#   value. The default is 2.



[heater_bed]
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1
control: pid
pid_Kp = 75.448
pid_Ki = 1.935
pid_Kd = 735.620
min_temp: 0
max_temp: 130

[heater_fan heatbreak_cooling_fan]
pin: PB6

[fan]
pin: PB5

[temperature_sensor MCU] 
sensor_type: temperature_mcu

[temperature_sensor CB1] 
sensor_type: temperature_host

[bed_screws]
screw1: 30.5, 37
screw2: 30.5, 207
screw3: 204.5, 207
screw4: 204.5, 37

# Warning: display section not tested!

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_3=PE7,   EXP1_5=PB2,  EXP1_7=PB1,  EXP1_9=<GND>,
    EXP1_2=PE9, EXP1_4=<RST>, EXP1_6=PE10, EXP1_8=PE11, EXP1_10=<5V>

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

[mcu rpi]
serial: /tmp/klipper_host_mcu




